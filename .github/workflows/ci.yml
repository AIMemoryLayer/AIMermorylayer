name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Python Tools
        run: pip install poetry==1.8.2 pre-commit

      - name: Install Monorepo Dependencies
        run: make install

      - name: Run Linters & Formatting Checks
        run: make lint

      - name: Build Turbo
        run: make build-all
